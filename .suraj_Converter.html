        body {
            font-family: 'Inter', sans-serif;
            background-color: #030712; /* Deep void background */
            color: #ecf0f1;
            overflow-x: hidden;
            margin: 0;

        /* Grid background layer */
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image: 
                linear-gradient(rgba(34, 211, 238, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(34, 211, 238, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; border-radius: 4px; }

            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.25) 50%, rgba(0,0,0,0.25));

            pointer-events: none;
            position: absolute;
            inset: 0;
            z-index: 10;

        /* Processing Glow Effect */

            0%, 100% { box-shadow: 0 0 15px rgba(6,182,212,0.2); }
            50% { box-shadow: 0 0 35px rgba(6,182,212,0.7); }
        }
        .processing-fx { animation: pulse-cyan 1.5s infinite; border-color: #22d3ee !important; }
    </style>
</head>

                    <button onclick="verifyAccess()" class="flex-1 bg-red-500/20 hover:bg-red-500/40 text-red-400 border border-red-500/50 py-3 rounded-lg font-mono text-xs font-bold transition shadow-[0_0_10px_rgba(239,68,68,0.2)] tracking-wider">AUTHORIZE</button>

    <!-- Direct Input Modal -->
    <div id="directModal" class="fixed inset-0 bg-black bg-opacity-90 backdrop-blur-xl hidden flex flex-col items-center justify-center p-4 z-50">
        <div class="bg-[#050b14] rounded-xl w-full max-w-lg border border-purple-500/40 p-8 shadow-[0_0_40px_rgba(168,85,247,0.2)] relative overflow-hidden">
            <div class="scanlines opacity-50"></div>
            <div class="relative z-20">
                <h3 class="text-purple-400 font-mono text-lg mb-4 font-bold tracking-widest flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 13h6m-3-3v6m5 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                    DIRECT ENCODER
                </h3>
                
                <label class="block text-xs font-mono text-purple-400/70 mb-2 tracking-wider">PAYLOAD TITLE (FILENAME)</label>
                <input type="text" id="directTitle" placeholder="e.g. secret_data" class="w-full bg-[#0b1120] text-emerald-400 font-mono p-3 rounded border border-purple-500/30 focus:outline-none focus:border-purple-400 focus:shadow-[0_0_10px_rgba(168,85,247,0.2)] mb-4 tracking-widest relative z-30">
                
                <label class="block text-xs font-mono text-purple-400/70 mb-2 tracking-wider">DATA STREAM (PASTE TEXT OR DROP FILE)</label>

                    <textarea id="directText" placeholder="Paste your text here...&#10;&#10;[ OR DRAG & DROP ANY FILE / IMG ]" class="w-full h-40 bg-transparent text-emerald-400 font-mono text-sm p-4 focus:outline-none resize-none z-10 relative placeholder-purple-500/30"></textarea>

                <div class="flex gap-4 mt-8 relative z-30">

                    <button onclick="processDirectEncode()" class="flex-1 bg-purple-500/20 hover:bg-purple-500/40 text-purple-400 border border-purple-500/50 py-3 rounded-lg font-mono text-xs font-bold transition shadow-[0_0_10px_rgba(168,85,247,0.2)] tracking-wider">ENCRYPT TO .SURAJ</button>

    <!-- Secure Vault Viewer Modal -->
    <div id="viewerModal" class="fixed inset-0 bg-black bg-opacity-95 backdrop-blur-2xl hidden flex flex-col items-center justify-center p-4 z-[60]">

                </div>
                <button onclick="closeViewer()" class="text-cyan-500 hover:text-cyan-300 transition hover:rotate-90 duration-300">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            
            <div class="flex-grow overflow-auto flex flex-col relative p-6 items-center justify-center min-h-[50vh] bg-black/40">
                <div class="scanlines z-10"></div>
                <textarea id="viewerText" readonly class="hidden w-full h-full min-h-[50vh] bg-[#0b1120]/80 text-emerald-400 font-mono text-sm p-6 rounded-lg focus:outline-none resize-none border border-cyan-500/20 shadow-inner relative z-20"></textarea>
                <video id="viewerVideo" controls class="hidden max-w-full max-h-[70vh] rounded-lg shadow-[0_0_30px_rgba(6,182,212,0.2)] relative z-20"></video>
                <img id="viewerImage" class="hidden max-w-full max-h-[70vh] rounded-lg shadow-[0_0_30px_rgba(6,182,212,0.2)] relative z-20 object-contain">
                <div id="viewerAudioContainer" class="hidden w-full max-w-md bg-[#0b1120]/90 p-6 rounded-xl border border-cyan-500/30 shadow-[0_0_20px_rgba(6,182,212,0.2)] relative z-20 flex flex-col items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-cyan-400 mb-6 animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3" />
                    </svg>
                    <audio id="viewerAudio" controls class="w-full outline-none"></audio>
                </div>
            </div>
            
            <div class="px-6 py-4 border-t border-cyan-500/20 flex justify-between items-center bg-cyan-900/20 z-20">
                <span class="text-[10px] text-cyan-500/70 font-mono tracking-widest uppercase">File Decrypted in Temporary Volatile Memory</span>
                <button onclick="closeViewer()" class="bg-red-500/10 hover:bg-red-500/30 text-red-400 border border-red-500/50 font-mono text-xs py-2 px-6 rounded transition tracking-widest font-bold shadow-[0_0_10px_rgba(239,68,68,0.2)]">
                    PURGE CACHE & CLOSE
                </button>

    </div>

    <script>
        // DOM Elements
        const encodeInput = document.getElementById('encodeInput');
        const decodeInput = document.getElementById('decodeInput');
        const statusMsg = document.getElementById('statusMsg');
        const mainApp = document.getElementById('mainApp');
        
        const pwdModal = document.getElementById('pwdModal');
        const pwdInput = document.getElementById('pwdInput');
        const pwdError = document.getElementById('pwdError');
        
        const viewerModal = document.getElementById('viewerModal');
        const viewerTitle = document.getElementById('viewerTitle');
        const viewerText = document.getElementById('viewerText');
        const viewerVideo = document.getElementById('viewerVideo');
        const viewerImage = document.getElementById('viewerImage');
        const viewerAudio = document.getElementById('viewerAudio');
        const viewerAudioContainer = document.getElementById('viewerAudioContainer');

        const directModal = document.getElementById('directModal');
        const directTitle = document.getElementById('directTitle');
        const directText = document.getElementById('directText');
        const dropZone = document.getElementById('dropZone');
        
        // State
        let pendingAction = null;
        let droppedFile = null;
        const PROTOCOL_HASH = 78757006; 
        const DELIMITER = "|||SURAJ_PROTOCOL_V2|||";

        // Cyber-Network Particle System
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
                this.color = Math.random() > 0.5 ? 'rgba(34, 211, 238, 0.6)' : 'rgba(16, 185, 129, 0.4)'; 
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            let numParticles = Math.min((canvas.width * canvas.height) / 12000, 100); 
            for (let i = 0; i < numParticles; i++) particles.push(new Particle());
        }
        initParticles();

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                // Draw connecting network lines
                for (let j = i; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < 120) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(34, 211, 238, ${0.15 - distance/800})`;
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // Core Security Hash
        function generateHash(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = (hash << 5) - hash + str.charCodeAt(i);
                hash |= 0;
            }
            return hash;
        }

        // Access Controls
        function requestAccess(action) {
            pendingAction = action;
            pwdInput.value = '';
            pwdError.classList.add('hidden');
            pwdModal.classList.remove('hidden');
            pwdInput.focus();
        }

        function cancelAccess() {
            pwdModal.classList.add('hidden');
            pendingAction = null;
        }

        function verifyAccess() {
            const inputHash = generateHash(pwdInput.value);
            if (inputHash === PROTOCOL_HASH) {
                pwdModal.classList.add('hidden');
                if (pendingAction === 'encode') encodeInput.click();
                else if (pendingAction === 'decode') decodeInput.click();
                else if (pendingAction === 'direct_encode') openDirectModal();
            } else {
                pwdError.classList.remove('hidden');
                pwdInput.value = '';
                pwdInput.focus();
            }
        }

        pwdInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') verifyAccess();
        });

        // Hexadecimal Conversion Algorithms
        function stringToHex(str) {
            const encoder = new TextEncoder();
            const view = encoder.encode(str); 
            let hex = '';
            for (let i = 0; i < view.length; i++) hex += view[i].toString(16).padStart(2, '0');
            return hex;
        }

        function hexToString(hex) {
            if (hex.length % 2 !== 0) throw new Error("Invalid");
            const bytes = new Uint8Array(hex.length / 2);
            for (let i = 0; i < hex.length; i += 2) bytes[i / 2] = parseInt(hex.substring(i, i + 2), 16);
            return new TextDecoder().decode(bytes);
        }

        function updateStatus(message, isError = false, isProcessing = false) {
            statusMsg.textContent = message;
            if (isProcessing) {
                statusMsg.className = "text-[11px] font-mono text-yellow-400 font-bold tracking-widest animate-pulse";
                mainApp.classList.add('processing-fx');
            } else if (isError) {
                statusMsg.className = "text-[11px] font-mono text-red-400 font-bold tracking-widest";
                mainApp.classList.remove('processing-fx');
            } else {
                statusMsg.className = "text-[11px] font-mono text-emerald-400 font-bold tracking-widest";
                mainApp.classList.remove('processing-fx');
            }
        }

        // Base Encryption Process
        function performEncryption(fileNameWithExt, dataUrl, baseName) {
            try {
                const payloadStr = fileNameWithExt + DELIMITER + dataUrl;
                const hexData = stringToHex(payloadStr);
                const newFileName = baseName + ".suraj";
                const blob = new Blob([hexData], { type: "text/plain" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = newFileName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                updateStatus(`ENCRYPTED: ${newFileName}`);
            } catch (error) {
                updateStatus(`ERROR`, true);
            }
        }

        // Standard File Encoding
        encodeInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;
            updateStatus("ENCRYPTING...", false, true);
            const reader = new FileReader();
            reader.onload = function(e) {
                setTimeout(() => {
                    const baseName = file.name.replace(/\.[^/.]+$/, "");
                    performEncryption(file.name, e.target.result, baseName);
                    encodeInput.value = ''; 
                }, 100);
            };
            reader.readAsDataURL(file);
        });

        // Direct Input / Drag and Drop Logic
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('bg-purple-900/30', 'border-purple-400');
        });
        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropZone.classList.remove('bg-purple-900/30', 'border-purple-400');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('bg-purple-900/30', 'border-purple-400');
            if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                droppedFile = e.dataTransfer.files[0];
                directTitle.value = droppedFile.name.replace(/\.[^/.]+$/, ""); 
                directText.value = `[ FILE LOADED: ${droppedFile.name} ]\nSize: ${(droppedFile.size / 1024).toFixed(2)} KB`;
                directText.readOnly = true;
                directText.classList.add('text-purple-300');
            }
        });

        function openDirectModal() {
            directModal.classList.remove('hidden');
            droppedFile = null;
            directText.value = '';
            directTitle.value = '';
            directText.readOnly = false;
            directText.classList.remove('text-purple-300');
        }

        function closeDirectModal() {
            directModal.classList.add('hidden');
        }

        function processDirectEncode() {
            let title = directTitle.value.trim();
            if (!title) title = "custom_payload";

            updateStatus("ENCRYPTING...", false, true);
            closeDirectModal();

            setTimeout(() => {
                if (droppedFile) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const ext = droppedFile.name.includes('.') ? '.' + droppedFile.name.split('.').pop() : '';
                        performEncryption(title + ext, e.target.result, title);
                    };
                    reader.readAsDataURL(droppedFile);
                } else {
                    const textContent = directText.value;
                    const textBlob = new Blob([textContent], { type: 'text/plain' });
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        performEncryption(title + ".txt", e.target.result, title);
                    };
                    reader.readAsDataURL(textBlob);
                }
            }, 100);
        }

        // Decoding Logic
        decodeInput.addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (!file) return;
            updateStatus("DECRYPTING...", false, true);
            const reader = new FileReader();
            reader.onload = function(e) {
                setTimeout(() => {
                    try {
                        const hexData = e.target.result.trim(); 
                        const decodedPayload = hexToString(hexData);
                        const parts = decodedPayload.split(DELIMITER);
                        if (parts.length !== 2) throw new Error("Format");
                        const originalName = parts[0];
                        const dataUrl = parts[1];
                        const mimeMatch = dataUrl.match(/^data:(.*?);/);
                        const mimeType = mimeMatch ? mimeMatch[1].toLowerCase() : '';
                        const isText = mimeType.startsWith('text/') || originalName.toLowerCase().endsWith('.txt');
                        const isVideo = mimeType.startsWith('video/') || originalName.toLowerCase().endsWith('.mp4');
                        const isAudio = mimeType.startsWith('audio/') || originalName.toLowerCase().endsWith('.mp3');
                        const isImage = mimeType.startsWith('image/') || originalName.toLowerCase().match(/\.(jpg|jpeg|png|gif|webp|svg)$/);

                        if (isText) {
                            fetch(dataUrl).then(res => res.text()).then(text => { showInViewer('text', text, originalName); updateStatus(`VIEWING: ${originalName}`); });
                        } else if (isVideo) {
                            showInViewer('video', dataUrl, originalName);
                            updateStatus(`VIEWING: ${originalName}`);
                        } else if (isAudio) {
                            showInViewer('audio', dataUrl, originalName);
                            updateStatus(`LISTENING: ${originalName}`);
                        } else if (isImage) {
                            showInViewer('image', dataUrl, originalName);
                            updateStatus(`VIEWING: ${originalName}`);
                        } else {
                            // Unsupported media format, trigger native secure download
                            const a = document.createElement('a');
                            a.href = dataUrl;
                            a.download = originalName;
                            document.body.appendChild(a);
                            a.click();
                            document.body.removeChild(a);
                            updateStatus(`DOWNLOADED: ${originalName}`);
                        }
                    } catch (error) {
                        updateStatus(`DECRYPTION FAILED`, true);
                    }
                    decodeInput.value = '';
                }, 100);
            };
            reader.readAsText(file);
        });

        function showInViewer(type, content, title) {
            viewerText.classList.add('hidden');
            viewerVideo.classList.add('hidden');
            viewerImage.classList.add('hidden');
            viewerAudioContainer.classList.add('hidden');
            viewerTitle.textContent = `DECRYPTED: ${title}`;
            
            if (type === 'text') {
                viewerText.value = content;
                viewerText.classList.remove('hidden');
            } else if (type === 'video') {
                viewerVideo.src = content;
                viewerVideo.classList.remove('hidden');
            } else if (type === 'audio') {
                viewerAudio.src = content;
                viewerAudioContainer.classList.remove('hidden');
            } else if (type === 'image') {
                viewerImage.src = content;
                viewerImage.classList.remove('hidden');
            }
            viewerModal.classList.remove('hidden');
        }

        function closeViewer() {
            viewerModal.classList.add('hidden');
            viewerText.value = ''; 
            viewerVideo.pause();
            viewerVideo.removeAttribute('src');
            viewerVideo.load();
            viewerImage.removeAttribute('src');
            viewerAudio.pause();
            viewerAudio.removeAttribute('src');
            viewerAudio.load();
        }

        // Global Event Listeners
        window.addEventListener('click', function(event) {
            if (event.target === viewerModal) closeViewer();
            if (event.target === pwdModal) cancelAccess();
            if (event.target === directModal) closeDirectModal();
        });
    </script>
</body>
</html>
